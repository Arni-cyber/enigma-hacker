<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Enigma Hacker</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>🔐 ACESSO AO SISTEMA</h2>

        <input id="login-email" placeholder="E-mail">
        <input id="login-senha" type="password" placeholder="Senha">

        <div class="login-buttons">
            <button onclick="fazerLogin()">LOGIN</button>
            <button onclick="fazerCadastro()">CADASTRAR</button>
        </div>
    </div>
</div>

<div id="app">
    <div id="terminal">

        <div id="game">
            <div id="stats">
                <span id="display-user">---</span>
                <span id="display-pontos">0</span>
                <span id="display-combo">x0</span>
            </div>

            <p id="texto-enigma">Aguardando...</p>

            <input id="resposta-input" placeholder="Digite..." autocomplete="off">

            <div id="log-feed"></div>
        </div>

        <div id="side-panel">
            <h3>RANKING</h3>
            <div id="ranking-list"></div>
            <div id="alert-box"></div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

</body>
</html>
